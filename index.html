<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Wikipedia — explore knowledge, offline-ready" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WikiPWA" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>WikiPWA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e17;
      --ink2: #3d3c4a;
      --ink3: #8b8a96;
      --paper: #faf9f6;
      --paper2: #f0ede6;
      --paper3: #e5e1d8;
      --accent: #e05c2a;
      --accent2: #f5a623;
      --blue: #1e4fa0;
      --blue-light: #edf2ff;
      --radius: 12px;
      --shadow: 0 2px 24px rgba(15,14,23,0.10);
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ─── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ─── Header ─── */
    header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 40px; height: 40px;
      background: var(--ink);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { display: block; }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--accent); }

    /* ─── Search ─── */
    .search-wrap {
      padding: 16px 24px 12px;
      flex-shrink: 0;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid var(--paper3);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(224,92,42,0.12);
    }

    #search-input {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      padding: 13px 16px;
    }

    #search-input::placeholder { color: var(--ink3); }

    #search-btn {
      background: var(--accent);
      border: none; outline: none;
      width: 48px; height: 48px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #search-btn:hover { background: #c44d1f; }
    #search-btn:active { transform: scale(0.95); }

    #search-btn svg { display: block; }

    /* ─── Language pill ─── */
    .lang-row {
      padding: 0 24px 8px;
      display: flex; gap: 8px; align-items: center;
      flex-wrap: wrap;
    }

    .lang-label {
      font-size: 12px;
      color: var(--ink3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    .lang-pill {
      background: var(--paper2);
      border: 1px solid var(--paper3);
      border-radius: 20px;
      font-size: 13px;
      padding: 3px 12px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--ink2);
      font-weight: 400;
    }

    .lang-pill.active, .lang-pill:hover {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ─── Main content area ─── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px 24px;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── States ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state .globe {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }

    .empty-state h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .empty-state p {
      color: var(--ink3);
      font-size: 15px;
      max-width: 320px;
      margin: 0 auto;
    }

    .quick-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 28px;
    }

    .quick-chip {
      background: #fff;
      border: 1.5px solid var(--paper3);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--ink2);
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .quick-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── Results list ─── */
    .results-header {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ink3);
      font-weight: 500;
      margin-bottom: 10px;
      padding-top: 4px;
    }

    .result-card {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--paper3);
      padding: 16px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; gap: 14px; align-items: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .result-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(224,92,42,0.10);
      transform: translateY(-1px);
    }

    .result-thumb {
      width: 60px; height: 60px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--paper2);
    }

    .result-thumb-placeholder {
      width: 60px; height: 60px;
      border-radius: 8px;
      background: var(--paper2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }

    .result-body { flex: 1; min-width: 0; }

    .result-title {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--ink);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-snippet {
      font-size: 13.5px;
      color: var(--ink3);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ─── Article view ─── */
    .article-view { display: none; }
    .article-view.visible { display: block; }
    .results-view.hidden { display: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink3);
      padding: 6px 0 16px;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--accent); }

    .article-frame-wrap {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--paper3);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .article-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--paper2);
      border-bottom: 1px solid var(--paper3);
      gap: 8px;
    }

    .article-url {
      font-size: 12px;
      color: var(--ink3);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .open-wiki-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      flex-shrink: 0;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s;
    }

    .open-wiki-btn:hover { background: #163c7c; }

    #article-frame {
      width: 100%;
      height: calc(100vh - 240px);
      min-height: 500px;
      border: none;
      display: block;
    }

    /* ─── Loading ─── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
      color: var(--ink3);
      font-size: 15px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--paper3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Offline banner ─── */
    #offline-banner {
      display: none;
      background: #fff3cd;
      color: #856404;
      font-size: 13px;
      text-align: center;
      padding: 8px 16px;
      flex-shrink: 0;
    }

    #offline-banner.show { display: block; }

    /* ─── Error ─── */
    .error-msg {
      background: #fff5f5;
      border: 1px solid #ffc9c9;
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      color: #c0392b;
      font-size: 14px;
    }

    /* ─── Install prompt ─── */
    #install-toast {
      display: none;
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: #fff;
      border-radius: 40px;
      padding: 12px 22px;
      font-size: 14px;
      gap: 12px;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      z-index: 1000;
      white-space: nowrap;
    }

    #install-toast.show { display: flex; }

    #install-btn {
      background: var(--accent);
      border: none; border-radius: 20px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 6px 16px;
      cursor: pointer;
    }

    #install-dismiss {
      background: none; border: none;
      color: var(--ink3); cursor: pointer;
      font-size: 18px; line-height: 1;
    }

    @media (max-width: 600px) {
      header { padding: 16px 16px 0; }
      .search-wrap { padding: 12px 16px 8px; }
      .lang-row { padding: 0 16px 8px; }
      main { padding: 8px 16px 24px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="offline-banner">⚡ You're offline — showing cached results</div>

  <header>
    <div class="logo-mark">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.5"/>
        <ellipse cx="12" cy="12" rx="4" ry="9" stroke="white" stroke-width="1.5"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke="white" stroke-width="1.5"/>
        <line x1="3.5" y1="7.5" x2="20.5" y2="7.5" stroke="white" stroke-width="1.2"/>
        <line x1="3.5" y1="16.5" x2="20.5" y2="16.5" stroke="white" stroke-width="1.2"/>
      </svg>
    </div>
    <div class="logo-text">Wiki<span>PWA</span></div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <input id="search-input" type="search" placeholder="Search Wikipedia…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="search-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="10.5" cy="10.5" r="6.5" stroke="white" stroke-width="2"/>
          <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="lang-row">
    <span class="lang-label">Lang</span>
    <button class="lang-pill active" data-lang="en">EN</button>
    <button class="lang-pill" data-lang="fr">FR</button>
    <button class="lang-pill" data-lang="de">DE</button>
    <button class="lang-pill" data-lang="es">ES</button>
    <button class="lang-pill" data-lang="zh">ZH</button>
    <button class="lang-pill" data-lang="ar">AR</button>
    <button class="lang-pill" data-lang="yo">YO</button>
  </div>

  <main>
    <div id="results-view" class="results-view">
      <div class="empty-state" id="empty-state">
        <span class="globe">🌍</span>
        <h2>Explore knowledge</h2>
        <p>Search millions of articles from Wikipedia in your language.</p>
        <div class="quick-topics">
          <button class="quick-chip" data-query="Artificial intelligence">Artificial intelligence</button>
          <button class="quick-chip" data-query="Nigeria">Nigeria</button>
          <button class="quick-chip" data-query="Space exploration">Space exploration</button>
          <button class="quick-chip" data-query="Climate change">Climate change</button>
          <button class="quick-chip" data-query="Ancient Rome">Ancient Rome</button>
          <button class="quick-chip" data-query="Mathematics">Mathematics</button>
        </div>
      </div>
      <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div>
        <span>Searching…</span>
      </div>
      <div id="results-list"></div>
    </div>

    <div id="article-view" class="article-view">
      <button class="back-btn" id="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <polyline points="15 18 9 12 15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to results
      </button>
      <div class="article-frame-wrap">
        <div class="article-toolbar">
          <span class="article-url" id="article-url"></span>
          <a class="open-wiki-btn" id="open-wiki-link" href="#" target="_blank" rel="noopener">
            Open ↗
          </a>
        </div>
        <iframe id="article-frame" title="Wikipedia article" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation" loading="lazy"></iframe>
      </div>
    </div>
  </main>
</div>

<div id="install-toast">
  📲 Add WikiPWA to your home screen
  <button id="install-btn">Install</button>
  <button id="install-dismiss" aria-label="Dismiss">✕</button>
</div>

<script>
  let currentLang = 'en';
  let deferredPrompt = null;
  let lastResults = [];

  const searchInput = document.getElementById('search-input');
  const searchBtn = document.getElementById('search-btn');
  const resultsList = document.getElementById('results-list');
  const emptyState = document.getElementById('empty-state');
  const loading = document.getElementById('loading');
  const resultsView = document.getElementById('results-view');
  const articleView = document.getElementById('article-view');
  const articleFrame = document.getElementById('article-frame');
  const articleUrl = document.getElementById('article-url');
  const openWikiLink = document.getElementById('open-wiki-link');
  const backBtn = document.getElementById('back-btn');
  const offlineBanner = document.getElementById('offline-banner');
  const installToast = document.getElementById('install-toast');

  // Offline detection
  function updateOnlineStatus() {
    offlineBanner.classList.toggle('show', !navigator.onLine);
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // Language switcher
  document.querySelectorAll('.lang-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.lang-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentLang = pill.dataset.lang;
    });
  });

  // Quick topic chips
  document.querySelectorAll('.quick-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      searchInput.value = chip.dataset.query;
      doSearch(chip.dataset.query);
    });
  });

  // Search triggers
  searchBtn.addEventListener('click', () => doSearch(searchInput.value.trim()));
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(searchInput.value.trim());
  });

  async function doSearch(query) {
    if (!query) return;
    showResultsView();
    emptyState.style.display = 'none';
    loading.style.display = 'flex';
    resultsList.innerHTML = '';

    try {
      const url = `https://${currentLang}.wikipedia.org/w/api.php?` + new URLSearchParams({
        action: 'query',
        list: 'search',
        srsearch: query,
        srnamespace: 0,
        srlimit: 12,
        srprop: 'snippet|titlesnippet',
        origin: '*',
        format: 'json'
      });

      const res = await fetch(url);
      const data = await res.json();
      const results = data.query?.search || [];

      loading.style.display = 'none';

      if (results.length === 0) {
        resultsList.innerHTML = `<div class="error-msg">No results found for "<strong>${escapeHtml(query)}</strong>". Try a different search.</div>`;
        return;
      }

      // Fetch page images
      const pageIds = results.map(r => r.pageid).join('|');
      let images = {};
      try {
        const imgUrl = `https://${currentLang}.wikipedia.org/w/api.php?` + new URLSearchParams({
          action: 'query',
          pageids: pageIds,
          prop: 'pageimages',
          pithumbsize: 120,
          origin: '*',
          format: 'json'
        });
        const imgRes = await fetch(imgUrl);
        const imgData = await imgRes.json();
        Object.values(imgData.query?.pages || {}).forEach(p => {
          if (p.thumbnail) images[p.pageid] = p.thumbnail.source;
        });
      } catch {}

      lastResults = results;
      resultsList.innerHTML = '';

      const header = document.createElement('div');
      header.className = 'results-header';
      header.textContent = `${results.length} results · ${currentLang}.wikipedia.org`;
      resultsList.appendChild(header);

      results.forEach(item => {
        const snippet = item.snippet.replace(/<\/?span[^>]*>/g, '').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"');
        const card = document.createElement('div');
        card.className = 'result-card';

        const thumb = images[item.pageid];
        const thumbEl = thumb
          ? `<img class="result-thumb" src="${thumb}" alt="" loading="lazy" />`
          : `<div class="result-thumb-placeholder">📄</div>`;

        card.innerHTML = `
          ${thumbEl}
          <div class="result-body">
            <div class="result-title">${escapeHtml(item.title)}</div>
            <div class="result-snippet">${escapeHtml(snippet)}</div>
          </div>
        `;

        card.addEventListener('click', () => openArticle(item.title));
        resultsList.appendChild(card);
      });

    } catch (err) {
      loading.style.display = 'none';
      resultsList.innerHTML = `<div class="error-msg">⚠️ Could not load results. Check your connection.</div>`;
    }
  }

  function openArticle(title) {
    const wikiUrl = `https://${currentLang}.m.wikipedia.org/wiki/${encodeURIComponent(title.replace(/ /g,'_'))}`;
    articleFrame.src = wikiUrl;
    articleUrl.textContent = wikiUrl.replace('https://','');
    openWikiLink.href = wikiUrl;
    resultsView.classList.add('hidden');
    articleView.style.display = 'block';
    articleView.classList.add('visible');
  }

  backBtn.addEventListener('click', () => {
    articleView.style.display = 'none';
    articleView.classList.remove('visible');
    resultsView.classList.remove('hidden');
    articleFrame.src = '';
  });

  function showResultsView() {
    articleView.style.display = 'none';
    articleView.classList.remove('visible');
    resultsView.classList.remove('hidden');
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // PWA Install prompt
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installToast.classList.add('show');
  });

  document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installToast.classList.remove('show');
  });

  document.getElementById('install-dismiss').addEventListener('click', () => {
    installToast.classList.remove('show');
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
